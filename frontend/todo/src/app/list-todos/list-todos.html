<h1> My ToDos</h1>

<div class="container">
<table class="table">
  <caption>
    List of Todos
  </caption>
  <thead>
    <tr>
      <th>ID</th>
      <th>Description</th>
      <th>Status</th>
      <th>Target Date</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let todo of todos">
      <td>{{ todo.id }}</td>
      <td>{{ todo.description }}</td>
      <td>{{ todo.done}}</td>
      <td>{{ todo.targetDate | date }}</td>
    </tr>
  </tbody>
</table>
</div>
