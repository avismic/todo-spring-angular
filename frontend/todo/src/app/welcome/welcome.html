<h1>Welcome</h1>
<div class="container">
  Welcome {{ name }}! You can manage your todos <a routerLink="/todos">here</a>.
</div>

<div class="container">
  Click here to get a customized message from the backend:
  <button (click)="getWelcomeMessageWithParameter()" class="btn btn-success">
    Get Welcome Message
  </button>
</div>

<div class="container" *ngIf="welcomeMessageFromService">
  <h3>
    Your customised message: {{ welcomeMessageFromService}}
  </h3>
   {{ welcomeMessageFromService}}
</div>
